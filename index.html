<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intro</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            background: url("home-background.jpg") center center / cover no-repeat;
        }

        .stage {
            position: relative;
            width: 100%;
            height: 100%;
            opacity: 1;
            transition: opacity 1s ease;
        }

        .stage.fade-out {
            opacity: 0;
        }

        /* Container stays perfectly centred */
        .logo-container {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 500px;      /* Change this to make the logo area bigger/smaller */
            height: 250px;
            transform: translate(-50%, -50%);
        }

        /* These move */
        .piece {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            animation-duration: 2s;
            animation-fill-mode: forwards;
            animation-timing-function: ease-in-out;
        }

        .piece img {
            width: 220px;      /* Change logo size here */
            height: auto;
            display: block;
        }

        /* Starts off-screen inside the container */
        .left-piece {
            left: -300px;
            animation-name: leftSlide;
        }

        .right-piece {
            left: 580px;
            animation-name: rightSlide;
        }

        @keyframes leftSlide {
            to {
                left: 40px;     /* Final position of left logo */
            }
        }

        @keyframes rightSlide {
            to {
                left: 240px;    /* Final position of right logo */
            }
        }

    </style>
</head>

<body>

<div class="stage" id="stage">

    <div class="logo-container">

        <div class="piece left-piece">
            <img src="left.png" alt="">
        </div>

        <div class="piece right-piece">
            <img src="right.png" alt="">
        </div>

    </div>

</div>

<script>
window.addEventListener("load", () => {

    setTimeout(() => {

        document.getElementById("stage").classList.add("fade-out");

        setTimeout(() => {
            window.location.href = "index.html";
        }, 1000);

    }, 2500);

});
</script>

</body>
</html>
